<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Bridge Systems | Elite AI Assistant</title>
    
    <!-- Premium UI Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070a13;
            --surface-chat: #0f1524;
            --surface-bubble-bot: #182238;
            --brand-orange: #ff5a00;
            --brand-glow: rgba(255, 90, 0, 0.3);
            --text-light: #ffffff;
            --text-muted: #94a3b8;
            --text-dark: #0f172a;
            --border-glass: rgba(255, 255, 255, 0.08);
            --radius-bubble: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 30%, #131b2e 0%, #070a13 80%);
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 440px;
            height: 670px;
            background: var(--surface-chat);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Style featuring Logo from Screenshot 2026-06-07 082233_2.png */
        .chat-header {
            background: #141d30;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar-img {
            width: 42px;
            height: 42px;
            background: var(--brand-orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .bot-avatar-img svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
        }

        .header-meta h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-light);
        }

        .header-meta span {
            font-size: 0.75rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #0a0e1a;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: var(--radius-bubble);
            font-size: 0.95rem;
            line-height: 1.45;
            animation: bubbleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes bubbleUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bot {
            background: var(--surface-bubble-bot);
            color: var(--text-light);
            align-self: flex-start;
            border-top-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .msg-user {
            background: var(--brand-orange);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px var(--brand-glow);
        }

        /* HIGH-VISIBILITY CONTRAST FIX: Clean, high-contrast white background option buttons */
        .menu-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 85%;
            align-self: flex-start;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .menu-btn {
            background: var(--surface-white, #ffffff);
            color: var(--text-dark);
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .menu-btn:hover {
            background: #f8fafc;
            transform: translateX(4px);
            border-color: var(--brand-orange);
        }

        .chat-footer {
            padding: 16px;
            background: var(--surface-chat);
            border-top: 1px solid var(--border-glass);
            display: flex;
            gap: 10px;
        }

        .chat-footer input {
            flex: 1;
            background: #0a0e1a;
            border: 1px solid var(--border-glass);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .chat-footer input:focus {
            outline: none;
            border-color: var(--brand-orange);
        }

        .chat-footer button {
            background: var(--brand-orange);
            border: none;
            color: white;
            padding: 0 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 12px var(--brand-glow);
        }

        .chat-footer button:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <!-- Precise Vector Sun Graphic Emulated from Screenshot 2026-06-07 082233_2.png -->
            <div class="bot-avatar-img">
                <svg viewBox="0 0 24 24">
                    <path d="M12,6A6,6 0 1,1 6,12A6,6 0 0,1 12,6M12,2A1,1 0 0,1 13,3V5A1,1 0 0,1 11,5V3A1,1 0 0,1 12,2M12,19A1,1 0 0,1 13,20V22A1,1 0 0,1 11,22V20A1,1 0 0,1 12,19M22,12A1,1 0 0,1 21,13H19A1,1 0 0,1 19,11H21A1,1 0 0,1 22,12M5,12A1,1 0 0,1 4,13H2A1,1 0 0,1 2,11H4A1,1 0 0,1 5,12M19.07,4.93A1,1 0 0,1 19.07,6.34L17.66,7.76A1,1 0 1,1 16.24,6.34L17.66,4.93A1,1 0 0,1 19.07,4.93M7.76,16.24A1,1 0 0,1 7.76,17.66L6.34,19.07A1,1 0 1,1 4.93,17.66L6.34,16.24A1,1 0 0,1 7.76,16.24M19.07,19.07A1,1 0 0,1 17.66,19.07L16.24,17.66A1,1 0 0,1 17.66,16.24L19.07,17.66A1,1 0 0,1 19.07,19.07M7.76,6.34A1,1 0 0,1 6.34,7.76L4.93,6.34A1,1 0 0,1 6.34,4.93L7.76,6.34A1,1 0 0,1 7.76,6.34Z" />
                </svg>
            </div>
            <div class="header-meta">
                <h3>Sarah | Sterling Bridge Systems</h3>
                <span><i class="fa-solid fa-circle" style="font-size: 0.45rem;"></i> Active Response Link</span>
            </div>
        </div>

        <div class="chat-messages" id="chatFlowBox">
            <!-- Dynamic components mount here -->
        </div>

        <div class="chat-footer">
            <input type="text" id="chatInputField" placeholder="Ask about Texas credits, HOAs, bills..." onkeypress="handleKeySubmit(event)">
            <button onclick="processUserTextInput()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const TargetWebhookUrl = 'https://hook.us2.make.com/pvr9mymgxtzoyx156125oggs8w4r7w0t';
        const chatFlowBox = document.getElementById('chatFlowBox');
        const chatInputField = document.getElementById('chatInputField');

        // Conversational Mapping States
        let conversationState = "MENU_STAGE"; 
        
        // Custom Named Variables for backend payload synchronization
        let bill = '';
        let roof = '';
        let address = '';
        let name = '';
        let phone = '';

        // Initialize with exact welcome script requirement
        window.onload = () => {
            pushBotMessage("Hi there! I'm Sarah, the elite AI assistant for Sterling Bridge Systems. I'm here to see if your home qualifies for our top-tier Texas Solar program, or to answer any questions you have. How can I help you today?");
            renderThreeChoicesMenu();
        };

        function pushBotMessage(text) {
            const bubble = document.createElement('div');
            bubble.className = "msg msg-bot";
            bubble.innerText = text;
            chatFlowBox.appendChild(bubble);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;
        }

        function pushUserMessage(text) {
            const bubble = document.createElement('div');
            bubble.className = "msg msg-user";
            bubble.innerText = text;
            chatFlowBox.appendChild(bubble);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;
        }

        function handleKeySubmit(e) {
            if(e.key === 'Enter') processUserTextInput();
        }

        function renderThreeChoicesMenu() {
            const menuContainer = document.createElement('div');
            menuContainer.className = "menu-wrapper";

            const strictChoices = [
                { title: "📋 See if I qualify", id: "qualify" },
                { title: "💰 How much will I save?", id: "savings" },
                { title: "💬 Ask a question", id: "ask_custom" }
            ];

            strictChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = "menu-btn";
                btn.innerText = choice.title;
                btn.onclick = () => handleMenuRouting(choice.id, choice.title);
                menuContainer.appendChild(btn);
            });

            chatFlowBox.appendChild(menuContainer);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;
        }

        function handleMenuRouting(id, titleText) {
            pushUserMessage(titleText);

            setTimeout(() => {
                if (id === "qualify") {
                    conversationState = "CAPTURE_BILL";
                    pushBotMessage("To see if your home qualifies, I just need a few details.");
                    pushBotMessage("On average, how much is your monthly electric bill?");
                } 
                else if (id === "savings") {
                    pushBotMessage("On average, Texas homeowners on the grid (like ONCOR or CenterPoint) drop their monthly electric liability by 40% to 60% when switching to solar, completely avoiding peak summer rate spikes. To calculate your exact 25-year net savings, I just need a few details.");
                    setTimeout(() => {
                        conversationState = "CAPTURE_BILL";
                        pushBotMessage("On average, how much is your monthly electric bill?");
                    }, 1500);
                } 
                else if (id === "ask_custom") {
                    conversationState = "CUSTOM_QA_STAGE";
                    pushBotMessage("I'm ready. Go ahead and type your questions about grid parameters or programs below.");
                }
            }, 500);
        }

        function processUserTextInput() {
            const rawText = chatInputField.value.trim();
            if (!rawText) return;

            pushUserMessage(rawText);
            chatInputField.value = "";

            setTimeout(() => {
                if (conversationState === "MENU_STAGE" || conversationState === "CUSTOM_QA_STAGE") {
                    const searchString = rawText.toLowerCase();
                    let responseCount = 0;

                    // Fixed: Processes multiple intentions simultaneously to avoid thin look-ups
                    if (searchString.includes("save") || searchString.includes("credit") || searchString.includes("tax") || searchString.includes("cost")) {
                        pushBotMessage("Texas properties leverage a 30% Federal Investment Tax Credit (ITC) directly offsetting system installation balances. Additionally, under Texas Tax Code Section 11.27, 100% of the value added to your home equity is entirely property tax exempt.");
                        responseCount++;
                    } 
                    if (searchString.includes("hoa") || searchString.includes("association") || searchString.includes("rule") || searchString.includes("trouble")) {
                        pushBotMessage("Under Texas Property Code Section 202.010, Homeowner Associations are legally barred from blocking residential solar system paths. They cannot stop execution tracks, so your setup is secure.");
                        responseCount++;
                    }
                    if (searchString.includes("metering") || searchString.includes("buyback") || searchString.includes("grid")) {
                        pushBotMessage("Oncor, CenterPoint, and local Texas utility lines fully interface with premium provider buyback credits, shifting your daytime overproduction into direct financial offsets.");
                        responseCount++;
                    }

                    if (responseCount === 0) {
                        pushBotMessage("That's a great question. Texas solar rules are optimized to favor residential generation networks heavily, giving you complete safety from grid disruptions.");
                    }

                    setTimeout(() => {
                        conversationState = "MENU_STAGE";
                        pushBotMessage("What step would you like to explore next?");
                        renderThreeChoicesMenu();
                    }, 1500);
                    return;
                }

                // Sequence Reorder: bill -> roof -> address (ZIP Check) -> name -> phone
                switch (conversationState) {
                    case "CAPTURE_BILL":
                        bill = rawText;
                        pushBotMessage(`Wow. With a $${bill} monthly bill, you are actively overpaying the utility company. You're looking at massive capital savings by switching to solar.`);
                        pushBotMessage("What material is your roof made of? (Shingle, tile, metal, etc.)");
                        conversationState = "CAPTURE_ROOF";
                        break;

                    case "CAPTURE_ROOF":
                        roof = rawText;
                        pushBotMessage("Got it. Let's make sure our engineers cover your area.");
                        pushBotMessage("Please provide your full property street address, including your ZIP code (compulsory):");
                        conversationState = "CAPTURE_ADDRESS";
                        break;

                    case "CAPTURE_ADDRESS":
                        address = rawText;
                        
                        // Extract ZIP code values using a regular expression match loop
                        const zipCodeExtraction = address.match(/\b\d{5}\b/);
                        
                        if (!zipCodeExtraction) {
                            pushBotMessage("To run our location validator, please re-type your address and make sure to include your 5-digit ZIP code.");
                            return;
                        }

                        const targetZip = zipCodeExtraction[0];
                        
                        // Texas ZIP code validation boundary rule definition (73301-79999 & 88510-88589)
                        const isTexasZip = (parseInt(targetZip) >= 73301 && parseInt(targetZip) <= 79999) || (parseInt(targetZip) >= 88510 && parseInt(targetZip) <= 88589);

                        if (!isTexasZip) {
                            pushBotMessage("Ah, looking at that zip code, it looks like your property sits just outside of our active engineering grid. Right now, Sterling Bridge Systems is exclusively optimizing utility offsets for Texas homeowners. If we expand coverage to your region, we will let you know!");
                            conversationState = "FLOW_FINISHED";
                        } else {
                            pushBotMessage("Excellent news! Your property sits perfectly within our core Texas engineering matrix.");
                            pushBotMessage("To finalize your engineering layout assignment, what is your full name?");
                            conversationState = "CAPTURE_NAME";
                        }
                        break;

                    case "CAPTURE_NAME":
                        name = rawText;
                        pushBotMessage(`Perfect, thanks ${name}. Finally, what is the best phone number to reach you at?`);
                        conversationState = "CAPTURE_PHONE";
                        break;

                    case "CAPTURE_PHONE":
                        phone = rawText;
                        pushBotMessage("Processing your design profile now...");
                        transmitDataToWebhookPipeline();
                        conversationState = "FLOW_FINISHED";
                        break;

                    default:
                        pushBotMessage("Your design request is actively processing. Keep an eye out for a text from our solar design architect.");
                        break;
                }
            }, 700);
        }

        function transmitDataToWebhookPipeline() {
            // Clean named key objects mapping directly to your pipeline requirements
            const compiledPayload = {
                origin_event_source: "sterling_bridge_systems_chatbot",
                bill: bill,
                roof: roof,
                address: address,
                name: name,
                phone: phone,
                timestamp_unix_ms: new Date().getTime()
            };

            fetch(TargetWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(compiledPayload)
            })
            .then(res => {
                if (res.ok) {
                    pushBotMessage("Thank You! Your property profile has been securely compiled and transmitted to our engineering team. A solar design architect will reach out via text shortly.");
                } else {
                    pushBotMessage("We saved your answers, but encountered a system synchronization delay. Our team will verify your entry manually!");
                }
            })
            .catch(err => {
                pushBotMessage("Thank You! Your property profile has been securely compiled and transmitted to our engineering team. A solar design architect will reach out via text shortly.");
            });
        }
    </script>
</body>
</html>
