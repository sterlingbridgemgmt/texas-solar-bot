<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Bridge Systems | Enterprise AI Agent</title>
    
    <!-- Premium UI Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070a13;
            --surface-chat: #000000; /* Pure Black Body */
            --surface-bubble-bot: #111111; /* Dark Bot Separation */
            --brand-orange: #ff5a00; /* Vibrant Interactive Orange */
            --brand-glow: rgba(255, 90, 0, 0.3);
            --text-light: #ffffff; /* High Contrast White Text */
            --text-muted: #a1a1aa;
            --border-glass: rgba(255, 255, 255, 0.12);
            --radius-bubble: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 30%, #131b2e 0%, #070a13 80%);
            position: relative;
            overflow: hidden;
        }

        /* Fixed Floating Launcher Widget Setup */
        .chat-widget-wrapper {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        /* Floating Text Preview Callout Bubble */
        .floating-preview-callout {
            background: var(--surface-chat);
            color: var(--text-light);
            border: 1px solid var(--border-glass);
            padding: 12px 18px;
            border-radius: 16px;
            border-bottom-right-radius: 4px;
            font-size: 0.88rem;
            max-width: 280px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: floatPeek 0.5s ease forward;
        }

        .floating-preview-callout:hover {
            transform: translateY(-2px);
            border-color: var(--brand-orange);
        }

        /* Launcher Trigger Circle Button */
        .chat-launcher-btn {
            width: 60px;
            height: 60px;
            background: var(--brand-orange);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 24px var(--brand-glow);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .chat-launcher-btn:hover {
            transform: scale(1.08) rotate(5deg);
        }

        /* Premium iOS-Style Unread Alert Badge */
        .notification-counter-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444; /* High visibility notification red */
            color: white;
            font-size: 0.72rem;
            font-weight: 800;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--surface-chat);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notification-counter-badge.active-count {
            opacity: 1;
            transform: scale(1);
        }

        /* Modern Slide-Up Main Chat Window Frame Container */
        .chat-container {
            width: 400px;
            height: 600px;
            background: var(--surface-chat);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            display: none; /* Controlled dynamically via state classes */
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chat-container.window-visible {
            display: flex;
            animation: widgetRise 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes widgetRise {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .chat-header {
            background: #000000;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-identity-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar-img {
            width: 38px;
            height: 38px;
            background: var(--brand-orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7px;
        }

        .bot-avatar-img svg {
            width: 100%;
            height: 100%;
            fill: #ffffff;
        }

        .header-meta h3 {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text-light);
        }

        .header-meta span {
            font-size: 0.72rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        /* Header Quick-Control Interaction Panel */
        .header-action-deck {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-control-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.05rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .header-control-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-light);
        }

        .header-control-btn.reset-trigger:hover {
            color: var(--brand-orange);
            background: rgba(255, 90, 0, 0.1);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #000000;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--radius-bubble);
            font-size: 0.92rem;
            line-height: 1.45;
        }

        .msg-bot {
            background: var(--surface-bubble-bot);
            color: var(--text-light);
            align-self: flex-start;
            border-top-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-user {
            background: var(--brand-orange);
            color: #ffffff;
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px var(--brand-glow);
        }

        .menu-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 85%;
            align-self: flex-start;
        }

        .menu-btn {
            background: var(--brand-orange);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(255, 90, 0, 0.15);
        }

        .menu-btn:hover {
            background: #ff6b1a;
            transform: translateX(4px);
        }

        .chat-footer {
            padding: 14px;
            background: #000000;
            border-top: 1px solid var(--border-glass);
            display: flex;
            gap: 8px;
        }

        .chat-footer input {
            flex: 1;
            background: #111111;
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.92rem;
            transition: border-color 0.2s ease;
        }

        .chat-footer input:focus {
            outline: none;
            border-color: var(--brand-orange);
        }

        .chat-footer button {
            background: var(--brand-orange);
            border: none;
            color: #ffffff;
            padding: 0 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .chat-footer button:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- Unified Floating Widget Frame -->
    <div class="chat-widget-wrapper">
        
        <!-- Live Window Container (Toggled Hidden/Visible) -->
        <div class="chat-container" id="systemChatFrame">
            <div class="chat-header">
                <div class="header-identity-block">
                    <div class="bot-avatar-img">
                        <svg viewBox="0 0 24 24">
                            <path d="M12,6A6,6 0 1,1 6,12A6,6 0 0,1 12,6M12,2A1,1 0 0,1 13,3V5A1,1 0 0,1 11,5V3A1,1 0 0,1 12,2M12,19A1,1 0 0,1 13,20V22A1,1 0 0,1 11,22V20A1,1 0 0,1 12,19M22,12A1,1 0 0,1 21,13H19A1,1 0 0,1 19,11H21A1,1 0 0,1 22,12M5,12A1,1 0 0,1 4,13H2A1,1 0 0,1 2,11H4A1,1 0 0,1 5,12M19.07,4.93A1,1 0 0,1 19.07,6.34L17.66,7.76A1,1 0 1,1 16.24,6.34L17.66,4.93A1,1 0 0,1 19.07,4.93M7.76,16.24A1,1 0 0,1 7.76,17.66L6.34,19.07A1,1 0 1,1 4.93,17.66L6.34,16.24A1,1 0 0,1 7.76,16.24M19.07,19.07A1,1 0 0,1 17.66,19.07L16.24,17.66A1,1 0 0,1 17.66,16.24L19.07,17.66A1,1 0 0,1 19.07,19.07M7.76,6.34A1,1 0 0,1 6.34,7.76L4.93,6.34A1,1 0 0,1 6.34,4.93L7.76,6.34A1,1 0 0,1 7.76,6.34Z" />
                        </svg>
                    </div>
                    <div class="header-meta">
                        <h3>Sarah | Sterling Bridge Systems</h3>
                        <span><i class="fa-solid fa-circle" style="font-size: 0.4rem;"></i> Operational Link</span>
                    </div>
                </div>
                
                <!-- Quick Control Options Layout Deck -->
                <div class="header-action-deck">
                    <button class="header-control-btn reset-trigger" onclick="triggerSystemHardReset()" title="Reset Session Layout"><i class="fa-solid fa-rotate-right"></i></button>
                    <button class="header-control-btn" onclick="toggleChatInterfaceWindow()" title="Minimize UI"><i class="fa-solid fa-minus"></i></button>
                </div>
            </div>

            <div class="chat-messages" id="chatFlowBox"></div>

            <div class="chat-footer">
                <input type="text" id="chatInputField" placeholder="Type message..." onkeypress="handleKeySubmit(event)">
                <button onclick="processUserTextInput()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- Initial External Text Callout Window -->
        <div class="floating-preview-callout" id="floatingCalloutBubble" onclick="toggleChatInterfaceWindow()">
            Hi! I'm Sarah from Sterling Bridge Systems. Let's see if your property qualifies for zero-down solar or get your questions answered!
        </div>

        <!-- Action Launcher Toggle Core Trigger Button -->
        <div class="chat-launcher-btn" onclick="toggleChatInterfaceWindow()">
            <i class="fa-solid fa-comments" id="launcherIconNode"></i>
            <!-- Core Realtime Messaging Array Tracker Badge -->
            <div class="notification-counter-badge" id="unreadCounterNode">0</div>
        </div>
    </div>

    <script>
        const TargetWebhookUrl = 'https://hook.us2.make.com/pvr9mymgxtzoyx156125oggs8w4r7w0t';
        const chatFlowBox = document.getElementById('chatFlowBox');
        const chatInputField = document.getElementById('chatInputField');
        const systemChatFrame = document.getElementById('systemChatFrame');
        const floatingCalloutBubble = document.getElementById('floatingCalloutBubble');
        const unreadCounterNode = document.getElementById('unreadCounterNode');
        const launcherIconNode = document.getElementById('launcherIconNode');

        let isChatWindowOpen = false;
        let unreadMessagesCount = 0;
        let conversationState = "MENU_STAGE"; 
        let bill = '', roof = '', address = '', name = '', phone = '';

        const SOLAR_COMPATIBLE_ROOFS = ["shingle", "shingles", "metal", "tile", "tiles", "composite", "asphalt", "concrete", "standing seam", "flat roof"];

        const AI_Solar_Knowledge_Base = [
            { keywords: ["space", "size", "square feet", "sq ft", "many panels", "area needed", "room", "footprint"], answer: "Most Texas residential properties require between 300 to 500 square feet of clear roof footprint to establish a complete structural framework. An average system layout balances 18 to 25 premium monocrystalline panels depending directly on your historical kilowatt footprint." },
            { keywords: ["battery", "powerwall", "storage", "outage", "blackout", "grid goes down", "freeze", "backup"], answer: "When the central utility grid goes dark, standalone systems decouple automatically to protect line workers. Integrating a lithium backup battery storage matrix (like an Enphase 5P or Tesla Powerwall) allows your architecture to create an isolated backup microgrid, continuously operating your critical loads through freezes or line breaks." },
            { keywords: ["cost", "price", "expensive", "investment", "upfront", "how much is", "finance", "loan", "ppa"], answer: "Sterling Bridge Systems focuses heavily on $0-down structural designs. Instead of an upfront equipment capital expense, the program works by replacing your volatile monthly utility liability with a lower, locked-in structured asset payment that never increases over time." },
            { keywords: ["warranty", "warranties", "broken", "hail", "damage", "leaks", "maintenance", "fix", "repair"], answer: "Every Tier-1 panel infrastructure system setup is reinforced by a comprehensive 25-year linear performance and structural equipment warranty. This blanket protection encompasses linear output optimization, micro-inverter reliability matrices, and comprehensive roof penetration weather seals." },
            { keywords: ["how long", "timeline", "take to install", "permits", "inspection", "process", "steps"], answer: "Engineering layout configuration and site verification protocols resolve in 1-2 weeks. Municipal permitting and utility interconnection agreements account for the primary timeline buffer. The physical onsite structural integration itself is highly optimized, completing within 24 to 48 hours." },
            { keywords: ["lifespan", "degrade", "efficiency", "last", "years", "old"], answer: "Premium silicon tier infrastructure modules maintain a highly resilient structural life expectancy exceeding 25 to 30 years. System degradation paths are strictly regulated, maintaining over 86% of original day-one peak operational efficiency at year 25." },
            { keywords: ["tax credit", "itc", "incentive", "rebate", "exempt"], answer: "Texas setups optimize financial returns via the 30% Federal Investment Tax Credit (ITC), directly deducting dollar-for-dollar from tax liabilities. Furthermore, Texas Property Tax Code Sec 11.27 guarantees 100% of the home equity value added by solar remains completely tax exempt." },
            { keywords: ["hoa", "association", "by laws", "block", "approve", "permission", "trouble"], answer: "Under strict Texas Property Code Section 202.010, Homeowner Associations are legally barred from blocking residential solar configurations. They retain variance rights to shape visual placement constraints for street visibility, but cannot stop execution tracks." }
        ];

        // Primary Core System Initializer
        window.onload = () => {
            initializeChatContentMatrix();
        };

        // Synthesizes a high-end clean digital notification audio ping completely asset-free
        function playDigitalMessageNotificationChime() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                const ctx = new AudioContextClass();
                
                const primaryOscillator = ctx.createOscillator();
                const secondaryOscillator = ctx.createOscillator();
                const systemGainNode = ctx.createGain();
                
                primaryOscillator.type = 'sine';
                primaryOscillator.frequency.setValueAtTime(587.33, ctx.currentTime); // D5 Musical Note Target
                primaryOscillator.frequency.setValueAtTime(880.00, ctx.currentTime + 0.08); // A5 Step Harmonic Accent
                
                secondaryOscillator.type = 'triangle';
                secondaryOscillator.frequency.setValueAtTime(1174.66, ctx.currentTime); // High D6 shimmer
                
                systemGainNode.gain.setValueAtTime(0.08, ctx.currentTime);
                systemGainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
                
                primaryOscillator.connect(systemGainNode);
                secondaryOscillator.connect(systemGainNode);
                systemGainNode.connect(ctx.destination);
                
                primaryOscillator.start();
                secondaryOscillator.start();
                primaryOscillator.stop(ctx.currentTime + 0.35);
                secondaryOscillator.stop(ctx.currentTime + 0.35);
            } catch(e) { 
                /* Active Fail-Safe Trap for Un-interacted browser audio rules */ 
            }
        }

        function toggleChatInterfaceWindow() {
            isChatWindowOpen = !isChatWindowOpen;
            if (isChatWindowOpen) {
                systemChatFrame.classList.add('window-visible');
                floatingCalloutBubble.style.display = 'none';
                launcherIconNode.className = "fa-solid fa-xmark";
                unreadMessagesCount = 0;
                updateNotificationBadgeDisplay();
            } else {
                systemChatFrame.classList.remove('window-visible');
                launcherIconNode.className = "fa-solid fa-comments";
            }
        }

        function initializeChatContentMatrix() {
            conversationState = "MENU_STAGE";
            bill = ''; roof = ''; address = ''; name = ''; phone = '';
            chatFlowBox.innerHTML = '';
            
            pushBotMessage("Hi there! I'm Sarah, the elite AI assistant for Sterling Bridge Systems. I'm here to see if your home qualifies for our top-tier Texas Solar program, or to answer any questions you have. How can I help you today?");
            renderThreeChoicesMenu();
        }

        function triggerSystemHardReset() {
            pushBotMessage("Resetting conversation system parameters...");
            setTimeout(() => {
                initializeChatContentMatrix();
            }, 600);
        }

        function updateNotificationBadgeDisplay() {
            if (unreadMessagesCount > 0 && !isChatWindowOpen) {
                unreadCounterNode.innerText = unreadMessagesCount;
                unreadCounterNode.classList.add('active-count');
            } else {
                unreadCounterNode.classList.remove('active-count');
                unreadMessagesCount = 0;
            }
        }

        function pushBotMessage(text) {
            const bubble = document.createElement('div');
            bubble.className = "msg msg-bot";
            bubble.innerText = text;
            chatFlowBox.appendChild(bubble);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;

            if (!isChatWindowOpen) {
                unreadMessagesCount++;
                updateNotificationBadgeDisplay();
            }
            playDigitalMessageNotificationChime();
        }

        function pushUserMessage(text) {
            const bubble = document.createElement('div');
            bubble.className = "msg msg-user";
            bubble.innerText = text;
            chatFlowBox.appendChild(bubble);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;
        }

        function handleKeySubmit(e) {
            if(e.key === 'Enter') processUserTextInput();
        }

        function renderThreeChoicesMenu() {
            const menuContainer = document.createElement('div');
            menuContainer.className = "menu-wrapper";

            const strictChoices = [
                { title: "📋 See if I qualify", id: "qualify" },
                { title: "💰 How much will I save?", id: "savings" },
                { title: "💬 Ask a question", id: "ask_custom" }
            ];

            strictChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = "menu-btn";
                btn.innerText = choice.title;
                btn.onclick = () => handleMenuRouting(choice.id, choice.title);
                menuContainer.appendChild(btn);
            });

            chatFlowBox.appendChild(menuContainer);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;
        }

        function handleMenuRouting(id, titleText) {
            if (conversationState !== "MENU_STAGE") return; 
            pushUserMessage(titleText);

            setTimeout(() => {
                if (id === "qualify") {
                    conversationState = "CAPTURE_BILL";
                    pushBotMessage("To see if your home qualifies, I just need a few details.");
                    pushBotMessage("On average, how much is your monthly electric bill?");
                } 
                else if (id === "savings") {
                    pushBotMessage("On average, Texas homeowners on the grid drop their monthly electric liability by 40% to 60% when switching to solar. To calculate your exact 25-year net savings, I just need a few details.");
                    setTimeout(() => {
                        conversationState = "CAPTURE_BILL";
                        pushBotMessage("On average, how much is your monthly electric bill?");
                    }, 1200);
                } 
                else if (id === "ask_custom") {
                    conversationState = "CUSTOM_QA_STAGE";
                    pushBotMessage("I'm ready. Go ahead and type your questions about grid parameters, equipment space footprints, or financial setups below.");
                }
            }, 500);
        }

        function processUserTextInput() {
            const rawText = chatInputField.value.trim();
            if (!rawText) return;

            const strictResetPattern = /^(restart|start over)$/i;
            if (conversationState !== "MENU_STAGE" && conversationState !== "CUSTOM_QA_STAGE" && strictResetPattern.test(rawText)) {
                pushUserMessage(rawText);
                chatInputField.value = "";
                triggerSystemHardReset();
                return;
            }

            pushUserMessage(rawText);
            chatInputField.value = "";

            setTimeout(() => {
                if (conversationState === "MENU_STAGE" || conversationState === "CUSTOM_QA_STAGE") {
                    const normalizedInput = rawText.toLowerCase();
                    let responseBuffer = [];

                    AI_Solar_Knowledge_Base.forEach(knowledgeBlock => {
                        const matchedKeyword = knowledgeBlock.keywords.some(keyword => normalizedInput.includes(keyword));
                        if (matchedKeyword) {
                            responseBuffer.push(knowledgeBlock.answer);
                        }
                    });

                    if (responseBuffer.length > 0) {
                        responseBuffer.forEach(matchedAnswer => pushBotMessage(matchedAnswer));
                    } else {
                        pushBotMessage("That's an excellent question. Texas localized power rules are fully structured to protect residential consumer generation systems, ensuring safe utility grid balancing and financial shielding.");
                    }

                    setTimeout(() => {
                        conversationState = "MENU_STAGE";
                        pushBotMessage("What step would you like to explore next?");
                        renderThreeChoicesMenu();
                    }, 4000); 
                    return;
                }

                switch (conversationState) {
                    case "CAPTURE_BILL":
                        let parsedBillValue = rawText.replace(/[\$\s,]/g, "");
                        if (isNaN(parsedBillValue) || parsedBillValue === "") {
                            pushBotMessage("Please type your monthly bill balance using numeric characters only (e.g., 150 or $200).");
                            return;
                        }
                        
                        bill = parsedBillValue;
                        pushBotMessage(`Wow. With a $${bill} monthly bill, you are actively overpaying the utility company. You're looking at massive capital savings by switching to solar.`);
                        pushBotMessage("What material is your roof made of? (Shingle, tile, metal, etc.)");
                        conversationState = "CAPTURE_ROOF";
                        break;

                    case "CAPTURE_ROOF":
                        const cleanRoofInput = rawText.toLowerCase().trim();
                        const isValidMaterial = SOLAR_COMPATIBLE_ROOFS.some(allowedType => cleanRoofInput.includes(allowedType));

                        if (!isValidMaterial || /\d/.test(rawText) || rawText.length < 3) {
                            pushBotMessage("Please enter a valid, solar-compatible roof structure material (e.g., Shingle, Metal, Tile, or Composite). We cannot install arrays on slate or wood roofs due to structural and fire liabilities.");
                            return;
                        }
                        
                        roof = rawText;
                        pushBotMessage("Got it. Let's make sure our engineers cover your area.");
                        pushBotMessage("Please provide your full property street address, including your ZIP code (required):");
                        conversationState = "CAPTURE_ADDRESS";
                        break;

                    case "CAPTURE_ADDRESS":
                        address = rawText;
                        const zipCodeExtraction = address.match(/\b\d{5}\b/);
                        
                        if (!zipCodeExtraction) {
                            pushBotMessage("To run our location validator, please re-type your address and make sure to include your 5-digit ZIP code.");
                            return;
                        }

                        const targetZip = zipCodeExtraction[0];
                        const isTexasZip = (parseInt(targetZip) >= 73301 && parseInt(targetZip) <= 79999) || (parseInt(targetZip) >= 88510 && parseInt(targetZip) <= 88589);

                        if (!isTexasZip) {
                            pushBotMessage("Ah, looking at that zip code, it looks like your property sits just outside of our active engineering grid. Right now, Sterling Bridge Systems is exclusively optimizing utility offsets for Texas homeowners.");
                            renderConversationResetOption();
                        } else {
                            pushBotMessage("Excellent news! Your property sits perfectly within our core Texas engineering matrix.");
                            pushBotMessage("To finalize your engineering layout assignment, what is your full name?");
                            conversationState = "CAPTURE_NAME";
                        }
                        break;

                    case "CAPTURE_NAME":
                        if (/\d/.test(rawText) || rawText.trim().length < 2) {
                            pushBotMessage("Please write a valid name sequence using letters only.");
                            return;
                        }
                        
                        name = rawText;
                        pushBotMessage(`Perfect, thanks ${name}. Finally, what is the best phone number to reach you at?`);
                        conversationState = "CAPTURE_PHONE";
                        break;

                    case "CAPTURE_PHONE":
                        let parsedPhoneValue = rawText.replace(/[\s\-\(\)\+]/g, "");
                        if (isNaN(parsedPhoneValue) || parsedPhoneValue.length < 7) {
                            pushBotMessage("Please enter your contact information using valid phone numbers only.");
                            return;
                        }
                        
                        phone = parsedPhoneValue;
                        pushBotMessage("Processing your design profile now...");
                        transmitDataToWebhookPipeline();
                        break;

                    default:
                        pushBotMessage("Your design request has been safely filed. Click the refresh control at the top to start over.");
                        renderConversationResetOption();
                        break;
                }
            }, 600);
        }

        function transmitDataToWebhookPipeline() {
            const compiledPayload = {
                origin_event_source: "sterling_bridge_systems_chatbot",
                bill: bill, roof: roof, address: address, name: name, phone: phone,
                timestamp_unix_ms: new Date().getTime()
            };

            fetch(TargetWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(compiledPayload)
            })
            .then(() => {
                pushBotMessage("Thank you! Your property profile has been securely compiled and transmitted. A solar design architect will reach out via text shortly.");
                renderConversationResetOption();
            })
            .catch(() => {
                pushBotMessage("Thank you! Your property profile has been securely compiled and transmitted. A solar design architect will reach out via text shortly.");
                renderConversationResetOption();
            });
        }

        function renderConversationResetOption() {
            conversationState = "FLOW_FINISHED";
            const resetContainer = document.createElement('div');
            resetContainer.className = "menu-wrapper";

            const resetBtn = document.createElement('button');
            resetBtn.className = "menu-btn";
            resetBtn.style.textAlign = "center";
            resetBtn.innerHTML = "<i class='fa-solid fa-rotate-right'></i> Start New Conversation";
            resetBtn.onclick = () => {
                initializeChatContentMatrix();
            };

            resetContainer.appendChild(resetBtn);
            chatFlowBox.appendChild(resetContainer);
            chatFlowBox.scrollTop = chatFlowBox.scrollHeight;
        }
    </script>
</body>
</html>
